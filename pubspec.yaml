name: toom
description: A modern manga/webtoon reader — premium anime experience, no paywalls.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.3

  # Image Caching
  cached_network_image: ^3.3.1

  # Local Storage
  shared_preferences: ^2.2.3

  # UI & Animations
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.1.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.3.3
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
